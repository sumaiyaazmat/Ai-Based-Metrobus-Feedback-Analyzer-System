<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Metro Bus — Admin Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #0D47A1 0%, #01579B 50%, #E65100 100%); }
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card {
      width:100%; max-width:420px;
      background: #fff;
      border-radius: 18px;
      padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    }
    .login-logo { text-align:center; margin-bottom:28px; }
    .login-logo .icon {
      width:64px; height:64px; border-radius:16px;
      background: linear-gradient(135deg, #E65100, #BF360C);
      display:flex; align-items:center; justify-content:center;
      margin: 0 auto 12px;
      box-shadow: 0 6px 24px rgba(230,81,0,0.35);
    }
    .login-logo .icon svg { width:36px; height:36px; }
    .login-logo h1 { font-family:'Inter',sans-serif; font-size:22px; font-weight:800; color:#1A2634; margin-bottom:4px; }
    .login-logo p { color:#6B7A90; font-size:13px; }
    .login-field { margin-bottom:16px; }
    .login-field label {
      display:block; font-size:11px; color:#6B7A90;
      text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; font-weight:600;
    }
    .login-field input {
      width:100%; padding:12px 14px;
      background:#F5F7FA; border:1.5px solid #DDE3EA;
      border-radius:9px; color:#1A2634; font-size:14px;
      font-family:'DM Sans',sans-serif; outline:none; transition:all .2s;
    }
    .login-field input:focus {
      border-color:#0D47A1; background:#fff;
      box-shadow:0 0 0 3px rgba(13,71,161,0.1);
    }
    .login-btn {
      width:100%; padding:13px; border-radius:9px; border:none;
      background:linear-gradient(135deg, #0D47A1, #1565C0);
      color:#fff; font-size:15px; font-weight:700;
      cursor:pointer; font-family:'DM Sans',sans-serif;
      transition:all .2s; margin-top:4px;
      box-shadow:0 4px 14px rgba(13,71,161,0.3);
    }
    .login-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(13,71,161,0.4); }
    .login-btn:active { transform:scale(.98); }
    .login-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .error-msg {
      background:#FFEBEE; border:1px solid #FFCDD2;
      border-radius:8px; padding:10px 14px;
      color:#C62828; font-size:13px; margin-top:12px; display:none;
    }
    .divider { border:none; border-top:1px solid #DDE3EA; margin:20px 0; }
    .portal-link { text-align:center; font-size:13px; color:#6B7A90; }
    .portal-link a { color:#0D47A1; text-decoration:none; font-weight:600; }
    .portal-link a:hover { text-decoration:underline; }
    .authority-tag {
      text-align:center; font-size:11px; color:#9DABB8;
      margin-top:16px; padding-top:16px; border-top:1px solid #EEF2F7;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 001 1h1a1 1 0 001-1v-1h8v1a1 1 0 001 1h1a1 1 0 001-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/>
        </svg>
      </div>
      <h1>Metro<span style="color:#E65100">Bus</span> Admin</h1>
      <p>Sign in to access the admin dashboard</p>
    </div>

    <div class="login-field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In to Dashboard</button>
    <div class="error-msg" id="error-msg"></div>
    <hr class="divider">
    <div class="portal-link">
      <a href="/">Back to Passenger Portal</a>
    </div>
    <div class="authority-tag">Punjab Mass Transit Authority — Secure Admin Access</div>
  </div>
</div>
<script>
function doLogin() {
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('error-msg');
  if (!username || !password) { showErr('Please enter username and password.'); return; }
  btn.textContent = 'Signing in...'; btn.disabled = true; err.style.display = 'none';
  fetch('/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username: username, password: password})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.success) { window.location.href = '/admin'; }
    else { showErr(d.message || 'Login failed. Check credentials.'); btn.textContent = 'Sign In to Dashboard'; btn.disabled = false; }
  })
  .catch(function(){ showErr('Connection error. Is the server running?'); btn.textContent = 'Sign In to Dashboard'; btn.disabled = false; });
}
function showErr(msg){ var e=document.getElementById('error-msg'); e.textContent=msg; e.style.display='block'; }
</script>
</body>
</html>
